{
  "script": "dist/worker.js",
  "name": "guangxi-travel-api",
  "compatibility_date": "2024-05-12",
  "usage_model": "unbound",
  "env": {
    "production": {
      "name": "guangxi-travel-api-prod",
      "script": "dist/worker.js"
    },
    "development": {
      "name": "guangxi-travel-api-dev",
      "script": "dist/worker.js"
    }
  },
  "kv_namespaces": [
    {
      "binding": "GUANGXI_KV",
      "id": "YOUR_KV_NAMESPACE_ID"
    }
  ],
  "durable_objects": {
    "bindings": [
      {
        "name": "GUANGXI_DURABLE",
        "class_name": "DatabaseDurableObject",
        "script_name": "guangxi-travel-api"
      }
    ]
  },
  "workers_dev": true,
  "site": {
    "bucket": "./pages/out",
    "entry-point": "worker"
  }
}
