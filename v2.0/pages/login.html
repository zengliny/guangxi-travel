<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广西旅游 v2.0 - 用户登录</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c1929 0%, #1e3a5f 100%);
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }

        .auth-header {
            padding: 40px 30px 20px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 28px;
            color: #0c1929;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #64748b;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            padding: 0 30px 30px;
            border-bottom: 1px solid #e2e8f0;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: #0ea5e9;
            color: white;
        }

        .auth-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0ea5e9;
        }

        .form-group .code-input {
            display: flex;
            gap: 10px;
        }

        .form-group .code-input input {
            flex: 1;
        }

        .code-btn {
            padding: 12px 20px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #334155;
            transition: all 0.3s;
        }

        .code-btn:hover {
            background: #e2e8f0;
        }

        .code-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auth-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.3);
        }

        .auth-footer {
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }

        .auth-footer a {
            color: #0ea5e9;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notification {
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.3s ease;
        }

        .notification-success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #22c55e;
        }

        .notification-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .notification-info {
            background: #e0f2fe;
            color: #075985;
            border-left: 4px solid #0ea5e9;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="notification-container" id="notification-container"></div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h1>广西旅游 v2.0</h1>
                <p>欢迎登录您的专属旅游服务账号</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">登录</div>
                <div class="auth-tab" onclick="switchTab('register')">注册</div>
            </div>

            <div class="auth-form">
                <form id="login-form">
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" name="phone" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="auth-submit">登录</button>
                </form>

                <form id="register-form" style="display: none;">
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" name="phone" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-group">
                        <label>验证码</label>
                        <div class="code-input">
                            <input type="text" name="code" placeholder="请输入验证码" maxlength="6" required>
                            <button type="button" class="code-btn" id="get-code-btn">获取验证码</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" name="confirmPassword" placeholder="请再次输入密码" required>
                    </div>
                    <button type="submit" class="auth-submit">注册</button>
                </form>
            </div>

            <div class="auth-footer">
                <p>没有账号？<a href="javascript:void(0)" onclick="switchTab('register')">立即注册</a></p>
                <p style="margin-top: 10px; font-size: 12px; color: #94a3b8;">登录即代表您同意我们的《服务协议》和《隐私政策》</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initAuth } from './src/auth.js';

        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.auth-tab');

            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }

        initAuth();
    </script>
</body>
</html>
